<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrintForm Server</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>PrintForm Cloud Queue</h1>
        <p>Upload dokumen dan atur konfigurasi cetak.</p>
      </header>

      <section class="card">
        <h2>Upload Print Job</h2>
        <form id="uploadForm">
          <label class="field">
            <span>Dokumen</span>
            <input type="file" name="document" required>
          </label>

          <label class="field">
            <span>Tujuan Client</span>
            <select name="targetClientId" id="clientSelect" required>
              <option value="">Memuat daftar client...</option>
            </select>
          </label>

          <label class="field">
            <span>Ukuran Kertas</span>
            <select name="paperSize">
              <option value="A4" selected>A4</option>
              <option value="A5">A5</option>
            </select>
          </label>

          <label class="field">
            <span>Banyak Salinan</span>
            <input type="number" name="copies" min="1" max="999" value="1">
          </label>

          <button type="submit">Kirim Job</button>
          <div id="uploadStatus" class="status"></div>
        </form>
      </section>

      <section class="card">
        <div class="row">
          <h2>Daftar Job</h2>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Dokumen</th>
              <th>Client</th>
              <th>Ukuran</th>
              <th>Salinan</th>
              <th>Status</th>
              <th>Waktu</th>
            </tr>
          </thead>
          <tbody id="jobsBody">
            <tr>
              <td colspan="7" class="muted">Belum ada job.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="card">
        <h2>Client Terhubung (Online)</h2>
        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>Status</th>
              <th>Terakhir Terlihat</th>
              <th>Printer</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="clientsBody">
            <tr>
              <td colspan="5" class="muted">Belum ada client.</td>
            </tr>
          </tbody>
        </table>
        <div id="clientsStatus" class="status"></div>
      </section>
    </main>

    <script>
      const uploadForm = document.getElementById("uploadForm");
      const uploadStatus = document.getElementById("uploadStatus");
      const jobsBody = document.getElementById("jobsBody");
      const refreshBtn = document.getElementById("refreshBtn");
      const clientSelect = document.getElementById("clientSelect");
      const clientsBody = document.getElementById("clientsBody");
      const clientsStatus = document.getElementById("clientsStatus");

      async function loadClients() {
        const previousSelection = clientSelect.value;
        const res = await fetch("/api/clients");
        const clients = await res.json();
        if (!Array.isArray(clients) || clients.length === 0) {
          clientSelect.innerHTML = '<option value="">Belum ada client online</option>';
          clientsBody.innerHTML = '<tr><td colspan="5" class="muted">Belum ada client online.</td></tr>';
          return;
        }

        const options = clients.map(client => {
          const label = `${client.name} (${client.status})`;
          return `<option value="${client.id}">${label}</option>`;
        }).join("");

        clientSelect.innerHTML = options;
        if (clients.length === 1) {
          clientSelect.value = clients[0].id;
        } else {
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "Pilih client";
          placeholder.disabled = true;
          placeholder.selected = true;
          clientSelect.prepend(placeholder);
          if (previousSelection) {
            clientSelect.value = previousSelection;
          }
        }

        clientsBody.innerHTML = clients.map(client => `
          <tr>
            <td>${client.name}</td>
            <td>${client.status}</td>
            <td>${new Date(client.lastSeen).toLocaleString()}</td>
            <td>${(client.printers || []).join(", ") || "-"}</td>
            <td><button type="button" data-client-id="${client.id}" data-client-name="${client.name}">Ping</button></td>
          </tr>
        `).join("");
      }

      async function loadJobs() {
        const res = await fetch("/api/jobs");
        const jobs = await res.json();
        if (!Array.isArray(jobs) || jobs.length === 0) {
          jobsBody.innerHTML = '<tr><td colspan="7" class="muted">Belum ada job.</td></tr>';
          return;
        }

        jobsBody.innerHTML = jobs.map(job => `
          <tr>
            <td>${job.id}</td>
            <td>${job.originalName}</td>
            <td>${job.targetClientName || job.targetClientId || "-"}</td>
            <td>${job.printConfig.paperSize}</td>
            <td>${job.printConfig.copies}</td>
            <td>${job.status}</td>
            <td>${new Date(job.createdAt).toLocaleString()}</td>
          </tr>
        `).join("");
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        uploadStatus.textContent = "Mengirim...";
        uploadStatus.className = "status";

        const formData = new FormData(uploadForm);
        try {
          const res = await fetch("/api/jobs", {
            method: "POST",
            body: formData
          });
          const body = await res.json();
          if (!res.ok) {
            uploadStatus.textContent = body.error || "Gagal mengirim job.";
            uploadStatus.className = "status error";
            return;
          }
          uploadStatus.textContent = "Job berhasil dikirim.";
          uploadStatus.className = "status success";
          uploadForm.reset();
          await loadJobs();
        } catch (err) {
          uploadStatus.textContent = "Gagal terhubung ke server.";
          uploadStatus.className = "status error";
        }
      });

      refreshBtn.addEventListener("click", loadJobs);
      refreshBtn.addEventListener("click", loadClients);
      clientsBody.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const clientId = target.dataset.clientId;
        const clientName = target.dataset.clientName;
        if (!clientId) {
          return;
        }

        clientsStatus.textContent = `Mengirim ping ke ${clientName || "client"}...`;
        clientsStatus.className = "status";

        try {
          const res = await fetch(`/api/clients/${clientId}/ping`, { method: "POST" });
          if (!res.ok) {
            clientsStatus.textContent = "Gagal mengirim ping.";
            clientsStatus.className = "status error";
            return;
          }
          clientsStatus.textContent = `Ping terkirim ke ${clientName || "client"}.`;
          clientsStatus.className = "status success";
        } catch (err) {
          clientsStatus.textContent = "Gagal terhubung ke server.";
          clientsStatus.className = "status error";
        }
      });
      loadClients();
      loadJobs();
      setInterval(loadClients, 5000);
    </script>
  </body>
</html>
